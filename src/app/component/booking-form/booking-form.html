<div class="min-h-screen bg-gray-100 p-6 flex items-center justify-center">
  <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8">
    <h2 class="text-2xl font-bold text-gray-800 mb-1">Book Seat No:{{ seatId }}</h2>
    <p class="text-gray-500 text-sm mb-6">Fill in passenger details to confirm</p>

    <div *ngIf="error" class="bg-red-50 border-l-4 border-red-500 text-red-700 px-4 py-3 rounded mb-5 text-sm">
      {{ error }}
    </div>

    <form [formGroup]="bookingForm" (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-semibold mb-2">First Name</label>
        <input type="text" formControlName="firstName"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="e.g. Michael" />
      <div *ngIf="errorService.getErrorMessage(bookingForm, 'firstName') as msg" class="text-red-500 text-xs mt-1">
  {{ msg }}
</div>
      </div>
      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-semibold mb-2">Last Name</label>
        <input type="text" formControlName="lastName"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="e.g. Clarke" />
        <div *ngIf="errorService.getErrorMessage(bookingForm, 'lastName') as msg" class="text-red-500 text-xs mt-1">
  {{ msg }}
</div>
      </div>
      <div class="mb-6">
        <label class="block text-gray-700 text-sm font-semibold mb-2">Email</label>
        <input type="email" formControlName="email"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="john@example.com" />
        <div *ngIf="errorService.getErrorMessage(bookingForm, 'email') as msg" class="text-red-500 text-xs mt-1">
  {{ msg }}
</div>
      </div>
      <div class="flex gap-3">
        <button type="submit" [disabled]="bookingForm.invalid" class="flex-1 bg-blue-600 text-white py-2.5 rounded-lg">
          Confirm Booking
        </button>
        <button type="button" (click)="cancel()"
          class="flex-1 bg-gray-200 text-gray-700 py-2.5 rounded-lg hover:bg-gray-300 font-semibold">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
